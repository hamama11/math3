<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  html,body{margin:0;padding:0}

  .hero{
    height:100vh;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:flex-end;              /* ✅ 아래로 붙이기 */
    justify-content:center;
    padding: 0 24px 40px;              /* 바닥 여백 */
    font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;
    background:linear-gradient(160deg,#061026 0%,#0a1b3a 55%,#030714 100%);
  }

  /* 은하수 */
  .milky{
    position:absolute; inset:-40%;
    background:
      radial-gradient(closest-side at 50% 50%, rgba(255,255,255,.10), transparent 62%),
      conic-gradient(from 240deg, rgba(255,255,255,.05), rgba(99,102,241,.18),
        rgba(251,191,36,.10), rgba(16,185,129,.12), rgba(255,255,255,.05));
    filter:blur(70px);
    mix-blend-mode:screen;
    opacity:.85;
    will-change: transform;
  }

  /* 별 */
  .stars{
    position:absolute; inset:0;
    opacity:.85;                       /* ✅ JS가 깜빡임 조절 */
    will-change: opacity;
    background:
      radial-gradient(circle at 8% 18%, rgba(255,255,255,.95) 0 1px, transparent 2px),
      radial-gradient(circle at 16% 62%, rgba(255,255,255,.80) 0 1px, transparent 2px),
      radial-gradient(circle at 28% 30%, rgba(255,255,255,.65) 0 1px, transparent 2px),
      radial-gradient(circle at 42% 16%, rgba(255,255,255,.75) 0 1px, transparent 2px),
      radial-gradient(circle at 55% 40%, rgba(255,255,255,.60) 0 1px, transparent 2px),
      radial-gradient(circle at 68% 22%, rgba(255,255,255,.70) 0 1px, transparent 2px),
      radial-gradient(circle at 76% 52%, rgba(255,255,255,.58) 0 1px, transparent 2px),
      radial-gradient(circle at 88% 26%, rgba(255,255,255,.65) 0 1px, transparent 2px);
  }

  /* 바다 */
  .ocean{
    position:absolute; left:0; right:0; bottom:0; height:46vh;
    background:
      radial-gradient(1000px 260px at 26% 40%, rgba(59,130,246,.28), transparent 65%),
      radial-gradient(800px 240px at 78% 70%, rgba(16,185,129,.16), transparent 65%),
      linear-gradient(180deg, rgba(2,6,23,0) 0%, rgba(2,6,23,.30) 18%, rgba(2,6,23,.92) 100%);
  }

  /* 파도 */
  .wave{
    position:absolute; left:-25%; width:150%;
    height:64px; bottom:13vh;
    background:rgba(255,255,255,.055);
    border-radius:999px;
    will-change: transform;
  }
  .wave.w2{bottom:9vh;height:52px;opacity:.7}
  .wave.w3{bottom:5vh;height:44px;opacity:.55}

  /* 유영 */
  .swim{
    position:absolute; left:-20%;
    font-size:46px; opacity:.9;
    will-change: transform;
    filter: drop-shadow(0 10px 30px rgba(0,0,0,.45));
    user-select:none;
  }
  .swim.w1{bottom:18vh;font-size:58px}
  .swim.t1{bottom:11vh;font-size:46px}
  .swim.w2{bottom:7vh;font-size:50px;opacity:.75}

  /* 하단 텍스트(맨 아래) */
  .center{
    position:relative;
    z-index:2;
    text-align:center;
  }
  .title{
    font-weight:1000;
    font-size:min(6vw,44px);
    color:rgba(255,255,255,.92);
    margin-bottom:8px;
  }
  .dday{
    font-weight:1000;
    line-height:1;
    font-size:min(14vw,120px);
    background:linear-gradient(135deg, #fbbf24, #6366f1, #10b981);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    filter:drop-shadow(0 16px 32px rgba(99,102,241,.25));
  }

  /* ✅ D-day 아래 공간(버튼 자리 느낌) */
  .spacer{
    height: 72px;                      /* 공간 크기 */
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="milky" id="milky"></div>
    <div class="stars" id="stars"></div>

    <div class="ocean">
      <div class="wave" id="w1"></div>
      <div class="wave w2" id="w2"></div>
      <div class="wave w3" id="w3"></div>

      <div class="swim t1" id="turtle">🐢</div>
      <div class="swim w1" id="whale1">🐋</div>
      <div class="swim w2" id="whale2">🐋</div>
    </div>

    <div class="center">
      <div class="title">Deepdive</div>
      <div class="dday">{{DDAY}}</div>
      <div class="spacer"></div>
    </div>
  </div>

<script>
  const milky  = document.getElementById("milky");
  const stars  = document.getElementById("stars");
  const w1     = document.getElementById("w1");
  const w2     = document.getElementById("w2");
  const w3     = document.getElementById("w3");
  const turtle = document.getElementById("turtle");
  const whale1 = document.getElementById("whale1");
  const whale2 = document.getElementById("whale2");

  const start = performance.now();

  function loop(now){
    const t = (now - start) / 1000;

    // ✅ 은하수: 크게 흔들 + 회전
    if (milky){
      const dx = Math.sin(t * 0.25) * 60;   // px
      const dy = Math.cos(t * 0.20) * 40;   // px
      const rot = t * 10;
      milky.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg) scale(1.08)`;
    }

    // ✅ 별: 확실히 깜빡
    if (stars){
      const op = 0.55 + (Math.sin(t * 2.5) + 1) * 0.20;  // 0.55~0.95
      stars.style.opacity = op.toFixed(3);
    }

    // ✅ 파도: 좌우 이동 크게
    const wave = (el, speed, ampX) => {
      if (!el) return;
      const x = Math.sin(t * speed) * ampX;         // %
      const y = Math.cos(t * speed * 1.3) * 3;      // px
      const sy = 1 + Math.sin(t * speed * 1.8) * 0.12;
      el.style.transform = `translateX(${x}%) translateY(${y}px) scaleY(${sy})`;
    };
    wave(w1, 0.9, 18);
    wave(w2, 0.7, 22);
    wave(w3, 0.6, 26);

    // ✅ 유영
    const swim = (el, speed, yAmp) => {
      if (!el) return;
      const x = ((t * speed) % 1) * 145;
      const y = Math.sin(t * 2.2) * yAmp;
      el.style.transform = `translateX(${x}vw) translateY(${y}px)`;
    };
    swim(turtle, 0.045, 6);
    swim(whale1, 0.032, 8);
    swim(whale2, 0.026, 7);

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
</script>
</body>
</html>
