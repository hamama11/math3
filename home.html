<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  html,body{margin:0;padding:0}
  .hero{
    height:100vh; position:relative; overflow:hidden;
    display:flex; align-items:flex-end; justify-content:center;
    padding: 0 24px 40px;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;
    background:linear-gradient(160deg,#061026 0%,#0a1b3a 55%,#030714 100%);
  }

  #starsCanvas{
    position:absolute; inset:0; width:100%; height:100%;
    z-index:0;
  }

  .ocean{
    position:absolute; left:0; right:0; bottom:0; height:46vh;
    z-index:1;
    background:
      radial-gradient(1000px 260px at 26% 40%, rgba(59,130,246,.28), transparent 65%),
      radial-gradient(800px 240px at 78% 70%, rgba(16,185,129,.16), transparent 65%),
      linear-gradient(180deg, rgba(2,6,23,0) 0%, rgba(2,6,23,.30) 18%, rgba(2,6,23,.92) 100%);
  }

  .wave{position:absolute; left:-25%; width:150%; height:64px; bottom:13vh;
        background:rgba(255,255,255,.055); border-radius:999px; will-change:transform;}
  .wave.w2{bottom:9vh;height:52px;opacity:.7}
  .wave.w3{bottom:5vh;height:44px;opacity:.55}

  .swim{position:absolute; left:-20%; font-size:46px; opacity:.9; will-change:transform;
        filter:drop-shadow(0 10px 30px rgba(0,0,0,.45)); user-select:none;}
  .swim.w1{bottom:18vh;font-size:58px}
  .swim.t1{bottom:11vh;font-size:46px}
  .swim.w2{bottom:7vh;font-size:50px;opacity:.75}

  /* ✅ 텍스트 박스를 별 회전 중심으로 쓰기 위해 id 부여 */
  .center{
    position:relative; z-index:2; text-align:center;
    transform: translateY(0);
  }
  .title{
    font-weight:1000; font-size:min(6vw,44px);
    color:rgba(255,255,255,.92);
    margin-bottom:8px;
    text-shadow:0 16px 50px rgba(0,0,0,.5);
  }
  .dday{
    font-weight:1000; line-height:1;
    font-size:min(14vw,120px);
    background:linear-gradient(135deg, #fbbf24, #6366f1, #10b981);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 16px 32px rgba(99,102,241,.25));
  }
  .spacer{height:72px;}
</style>
</head>
<body>
  <div class="hero">
    <canvas id="starsCanvas"></canvas>

    <div class="ocean">
      <div class="wave" id="w1"></div>
      <div class="wave w2" id="w2"></div>
      <div class="wave w3" id="w3"></div>

      <div class="swim t1" id="turtle">🐢</div>
      <div class="swim w1" id="whale1">🐋</div>
      <div class="swim w2" id="whale2">🐋</div>
    </div>

    <!-- ✅ 별 회전 중심 타겟 -->
    <div class="center" id="centerBox">
      <div class="title">Deepdive</div>
      <div class="dday">{{DDAY}}</div>
      <div class="spacer"></div>
    </div>
  </div>

<script>
  // ===== Star Trails centered at Deepdive/D-day =====
  const canvas = document.getElementById("starsCanvas");
  const ctx = canvas.getContext("2d", { alpha: true });
  const centerBox = document.getElementById("centerBox");

  function resize(){
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width  = Math.floor(canvas.clientWidth  * dpr);
    canvas.height = Math.floor(canvas.clientHeight * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener("resize", () => { resize(); });
  resize();

  // ✅ 텍스트 박스의 "화면상 중심"을 pole로 사용
  function pole(){
    const r = centerBox.getBoundingClientRect();
    const x = r.left + r.width/2;
    const y = r.top  + r.height/2 - 10; // 살짝 위로(취향)
    return { x, y };
  }

  // 별 생성
  const STAR_N = 300;
  const stars = [];
  const maxR = () => Math.hypot(canvas.clientWidth, canvas.clientHeight) * 0.95;

  function seedStars(){
    stars.length = 0;
    for (let i=0;i<STAR_N;i++){
      const r = Math.pow(Math.random(), 0.55) * maxR();
      const a = Math.random() * Math.PI * 2;
      const tw = 0.55 + Math.random() * 0.95;
      const sz = 0.6 + Math.random() * 1.4;
      stars.push({ r, a, tw, sz });
    }
  }
  seedStars();

  // 장노출 잔상
  const TRAIL_FADE = 0.03;   // 작을수록 궤적 길어짐
  const OMEGA = 0.05;       // 회전 속도

  // 첫 화면
  ctx.fillStyle = "rgba(2,6,23,1)";
  ctx.fillRect(0,0,canvas.clientWidth, canvas.clientHeight);

  let last = performance.now();
  function loop(now){
    const dt = Math.min(0.05, (now - last)/1000);
    last = now;

    const {x:cx, y:cy} = pole();

    // 잔상용 어두운 레이어
    ctx.fillStyle = `rgba(2,6,23,${TRAIL_FADE})`;
    ctx.fillRect(0,0,canvas.clientWidth, canvas.clientHeight);

    // 아주 약한 비네팅/광도
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(canvas.clientWidth, canvas.clientHeight));
    g.addColorStop(0, "rgba(255,255,255,0.018)");
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,canvas.clientWidth, canvas.clientHeight);

    for (const s of stars){
      s.a += OMEGA * dt;

      const x = cx + Math.cos(s.a) * s.r;
      const y = cy + Math.sin(s.a) * s.r;
      if (x < -20 || x > canvas.clientWidth+20 || y < -20 || y > canvas.clientHeight+20) continue;

      const flicker = 0.55 + 0.45 * Math.sin(now/1000 * (0.9 + s.tw) + s.r*0.002);
      const alpha = Math.min(0.95, 0.20 + 0.60 * s.tw * flicker);

      // 약간의 따뜻/차가운 별 섞기
      const warm = (s.r % 3) < 1 ? 0.12 : 0.0;
      ctx.fillStyle = `rgba(${255*(0.92+warm)},${255*(0.94+warm*0.2)},255,${alpha})`;

      ctx.beginPath();
      ctx.arc(x, y, s.sz, 0, Math.PI*2);
      ctx.fill();
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ===== Ocean / Swim =====
  const w1 = document.getElementById("w1");
  const w2 = document.getElementById("w2");
  const w3 = document.getElementById("w3");
  const turtle = document.getElementById("turtle");
  const whale1 = document.getElementById("whale1");
  const whale2 = document.getElementById("whale2");
  const start2 = performance.now();

  function loop2(now){
    const t = (now - start2)/1000;

    const wave = (el, speed, ampX) => {
      if (!el) return;
      const x = Math.sin(t * speed) * ampX;
      const y = Math.cos(t * speed * 1.3) * 2.5;
      const sy = 1 + Math.sin(t * speed * 1.8) * 0.10;
      el.style.transform = `translateX(${x}%) translateY(${y}px) scaleY(${sy})`;
    };
    wave(w1, 0.9, 14);
    wave(w2, 0.7, 18);
    wave(w3, 0.6, 22);

    const swim = (el, speed, yAmp) => {
      if (!el) return;
      const x = ((t * speed) % 1) * 145;
      const y = Math.sin(t * 2.2) * yAmp;
      el.style.transform = `translateX(${x}vw) translateY(${y}px)`;
    };
    swim(turtle, 0.045, 6);
    swim(whale1, 0.032, 8);
    swim(whale2, 0.026, 7);

    requestAnimationFrame(loop2);
  }
  requestAnimationFrame(loop2);

  // 리사이즈 시 별 다시 뿌리기(화면 크기 바뀌면 자연스럽게)
  window.addEventListener("resize", () => {
    resize();
    seedStars();
    ctx.fillStyle = "rgba(2,6,23,1)";
    ctx.fillRect(0,0,canvas.clientWidth, canvas.clientHeight);
  });
</script>
</body>
</html>
