<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  html,body{margin:0;padding:0}
  .hero{
    height:100vh; position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;
    background:linear-gradient(160deg,#061026 0%,#0a1b3a 55%,#030714 100%);
  }
  .milky{
    position:absolute; inset:-40%;
    background:
      radial-gradient(closest-side at 50% 50%, rgba(255,255,255,.10), transparent 62%),
      conic-gradient(from 240deg, rgba(255,255,255,.05), rgba(99,102,241,.18),
        rgba(251,191,36,.10), rgba(16,185,129,.12), rgba(255,255,255,.05));
    filter:blur(70px);
    mix-blend-mode:screen;
    opacity:.85;
    animation:drift 12s linear infinite;
  }
  @keyframes drift{
    0%{transform:translate(-6%,-4%) rotate(0) scale(1.05)}
    50%{transform:translate(6%,5%) rotate(180deg) scale(1.10)}
    100%{transform:translate(-6%,-4%) rotate(360deg) scale(1.05)}
  }
  .stars{
    position:absolute; inset:0; opacity:.85;
    background:
      radial-gradient(circle at 8% 18%, rgba(255,255,255,.95) 0 1px, transparent 2px),
      radial-gradient(circle at 16% 62%, rgba(255,255,255,.80) 0 1px, transparent 2px),
      radial-gradient(circle at 42% 16%, rgba(255,255,255,.75) 0 1px, transparent 2px),
      radial-gradient(circle at 76% 52%, rgba(255,255,255,.58) 0 1px, transparent 2px),
      radial-gradient(circle at 88% 26%, rgba(255,255,255,.65) 0 1px, transparent 2px);
    animation:twinkle 3s ease-in-out infinite alternate;
  }
  @keyframes twinkle{from{opacity:.45}to{opacity:.95}}

  .ocean{
    position:absolute; left:0; right:0; bottom:0; height:46vh;
    background:
      radial-gradient(1000px 260px at 26% 40%, rgba(59,130,246,.28), transparent 65%),
      radial-gradient(800px 240px at 78% 70%, rgba(16,185,129,.16), transparent 65%),
      linear-gradient(180deg, rgba(2,6,23,0) 0%, rgba(2,6,23,.30) 18%, rgba(2,6,23,.92) 100%);
  }
  .wave{
    position:absolute; left:-25%; width:150%;
    height:64px; bottom:13vh;
    background:rgba(255,255,255,.055);
    border-radius:999px;
    animation:wave 8s ease-in-out infinite;
  }
  .wave.w2{bottom:9vh;height:52px;opacity:.7;animation-duration:10s;animation-direction:reverse}
  .wave.w3{bottom:5vh;height:44px;opacity:.55;animation-duration:12s}
  @keyframes wave{
    0%{transform:translateX(0) scaleY(1)}
    50%{transform:translateX(6%) scaleY(1.16)}
    100%{transform:translateX(0) scaleY(1)}
  }

  .swim{
    position:absolute; left:-20%; bottom:12vh;
    font-size:46px; opacity:.9;
    animation: swim 18s linear infinite, bob 2.6s ease-in-out infinite;
    filter: drop-shadow(0 10px 30px rgba(0,0,0,.45));
    user-select:none;
  }
  .swim.w1{bottom:18vh;font-size:58px;animation-duration:24s}
  .swim.t1{bottom:11vh;font-size:46px;animation-duration:20s}
  .swim.w2{bottom:7vh;font-size:50px;animation-duration:28s;opacity:.75}
  @keyframes swim{0%{transform:translateX(0vw)}100%{transform:translateX(145vw)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

  .center{position:relative; z-index:2; text-align:center; padding:24px}
  .title{font-weight:1000; font-size:min(7vw,56px); color:rgba(255,255,255,.92)}
  .dday{
    margin-top:14px; font-weight:1000; line-height:1;
    font-size:min(16vw,150px);
    background:linear-gradient(135deg, #fbbf24, #6366f1, #10b981);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 16px 32px rgba(99,102,241,.25));
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="milky"></div>
    <div class="stars"></div>
    <div class="ocean">
      <div class="wave"></div><div class="wave w2"></div><div class="wave w3"></div>
      <div class="swim t1">🐢</div>
      <div class="swim w1">🐋</div>
      <div class="swim w2">🐋</div>
    </div>

    <div class="center">
      <div class="title">Deepdive</div>
      <div class="dday">{{DDAY}}</div>
    </div>
  </div>
</body>
</html>
