<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  html,body{margin:0;padding:0}

  .hero{
    height:100vh;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding: 0 24px 40px;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;
    background:linear-gradient(160deg,#061026 0%,#0a1b3a 55%,#030714 100%);
  }

  /* ✅ 별(2겹: 패럴랙스 느낌, JS로 background-position 이동) */
  .stars{
    position:absolute; inset:-20%;
    opacity:.95;
    will-change: background-position, transform, opacity;
    background-size: 520px 520px;
    background-image:
      radial-gradient(circle, rgba(255,255,255,.95) 0 1px, transparent 2px),
      radial-gradient(circle, rgba(255,255,255,.70) 0 1px, transparent 2px),
      radial-gradient(circle, rgba(255,255,255,.55) 0 1px, transparent 2px),
      radial-gradient(circle, rgba(255,255,255,.45) 0 1px, transparent 2px);
    /* 각 레이어 위치를 다르게(한 장의 연속사진처럼) */
    background-position:
      40px 80px,
      220px 140px,
      340px 360px,
      120px 420px;
    filter: drop-shadow(0 0 6px rgba(255,255,255,.05));
  }
  .stars.back{
    opacity:.55;
    transform: scale(1.02);
    background-size: 760px 760px;
    filter: blur(.2px);
  }

  /* 바다 */
  .ocean{
    position:absolute; left:0; right:0; bottom:0; height:46vh;
    background:
      radial-gradient(1000px 260px at 26% 40%, rgba(59,130,246,.28), transparent 65%),
      radial-gradient(800px 240px at 78% 70%, rgba(16,185,129,.16), transparent 65%),
      linear-gradient(180deg, rgba(2,6,23,0) 0%, rgba(2,6,23,.30) 18%, rgba(2,6,23,.92) 100%);
  }

  /* 파도 */
  .wave{
    position:absolute; left:-25%; width:150%;
    height:64px; bottom:13vh;
    background:rgba(255,255,255,.055);
    border-radius:999px;
    will-change: transform;
  }
  .wave.w2{bottom:9vh;height:52px;opacity:.7}
  .wave.w3{bottom:5vh;height:44px;opacity:.55}

  /* 유영 */
  .swim{
    position:absolute; left:-20%;
    font-size:46px; opacity:.9;
    will-change: transform;
    filter: drop-shadow(0 10px 30px rgba(0,0,0,.45));
    user-select:none;
  }
  .swim.w1{bottom:18vh;font-size:58px}
  .swim.t1{bottom:11vh;font-size:46px}
  .swim.w2{bottom:7vh;font-size:50px;opacity:.75}

  /* 하단 텍스트 */
  .center{position:relative; z-index:2; text-align:center}
  .title{
    font-weight:1000;
    font-size:min(6vw,44px);
    color:rgba(255,255,255,.92);
    margin-bottom:8px;
  }
  .dday{
    font-weight:1000;
    line-height:1;
    font-size:min(14vw,120px);
    background:linear-gradient(135deg, #fbbf24, #6366f1, #10b981);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    filter:drop-shadow(0 16px 32px rgba(99,102,241,.25));
  }

  /* D-day 아래 공간 */
  .spacer{height:72px;}
</style>
</head>
<body>
  <div class="hero">
    <!-- ✅ 은하수 삭제 -->
    <div class="stars back" id="starsBack"></div>
    <div class="stars" id="starsFront"></div>

    <div class="ocean">
      <div class="wave" id="w1"></div>
      <div class="wave w2" id="w2"></div>
      <div class="wave w3" id="w3"></div>

      <div class="swim t1" id="turtle">🐢</div>
      <div class="swim w1" id="whale1">🐋</div>
      <div class="swim w2" id="whale2">🐋</div>
    </div>

    <div class="center">
      <div class="title">Deepdive</div>
      <div class="dday">{{DDAY}}</div>
      <div class="spacer"></div>
    </div>
  </div>

<script>
  const starsBack  = document.getElementById("starsBack");
  const starsFront = document.getElementById("starsFront");
  const w1 = document.getElementById("w1");
  const w2 = document.getElementById("w2");
  const w3 = document.getElementById("w3");
  const turtle = document.getElementById("turtle");
  const whale1 = document.getElementById("whale1");
  const whale2 = document.getElementById("whale2");

  const start = performance.now();

  function loop(now){
    const t = (now - start) / 1000;

    // ✅ 별 “연속사진 이동”: background-position을 계속 흘려보냄 (두 겹 패럴랙스)
    if (starsFront){
      const x = t * 18;     // px/s
      const y = t * 8;
      starsFront.style.backgroundPosition =
        `${40 - x}px ${80 - y}px,
         ${220 - x*1.2}px ${140 - y*1.1}px,
         ${340 - x*0.9}px ${360 - y*1.3}px,
         ${120 - x*1.4}px ${420 - y*0.8}px`;
    }
    if (starsBack){
      const x = t * 8;
      const y = t * 3.5;
      starsBack.style.backgroundPosition =
        `${140 - x}px ${180 - y}px,
         ${420 - x*1.1}px ${240 - y*0.9}px,
         ${560 - x*0.8}px ${520 - y*1.2}px,
         ${260 - x*1.3}px ${620 - y*0.7}px`;
      // 아주 미세한 숨쉬기(깜빡임은 과하지 않게)
      starsBack.style.opacity = (0.48 + (Math.sin(t*0.8)+1)*0.03).toFixed(3);
    }

    // ✅ 파도
    const wave = (el, speed, ampX) => {
      if (!el) return;
      const x = Math.sin(t * speed) * ampX;      // %
      const y = Math.cos(t * speed * 1.3) * 3;   // px
      const sy = 1 + Math.sin(t * speed * 1.8) * 0.12;
      el.style.transform = `translateX(${x}%) translateY(${y}px) scaleY(${sy})`;
    };
    wave(w1, 0.9, 18);
    wave(w2, 0.7, 22);
    wave(w3, 0.6, 26);

    // ✅ 유영
    const swim = (el, speed, yAmp) => {
      if (!el) return;
      const x = ((t * speed) % 1) * 145;
      const y = Math.sin(t * 2.2) * yAmp;
      el.style.transform = `translateX(${x}vw) translateY(${y}px)`;
    };
    swim(turtle, 0.045, 6);
    swim(whale1, 0.032, 8);
    swim(whale2, 0.026, 7);

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
</script>
</body>
</html>
